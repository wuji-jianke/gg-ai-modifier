name: Android APK Build

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: Flutter build mode
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
      target_platform:
        description: Flutter target platform
        required: true
        default: android-arm64
        type: choice
        options:
          - android-arm64
          - android-arm
          - android-arm,android-arm64
  push:
    branches:
      - master
    paths:
      - .github/workflows/android.yml
      - android/**
      - assets/**
      - lib/**
      - lua/**
      - pubspec.yaml
      - pubspec.lock

permissions:
  contents: read

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      BUILD_MODE: ${{ github.event.inputs.build_mode || 'debug' }}
      TARGET_PLATFORM: ${{ github.event.inputs.target_platform || 'android-arm64' }}
      ANDROID_NDK_VERSION: 28.2.13676358
      CMAKE_VERSION: 3.22.1
      CMDLINE_TOOLS_ZIP: commandlinetools-linux-11076708_latest.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK tools
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/android-sdk}"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          rm -rf "$ANDROID_SDK_ROOT/cmdline-tools/latest" /tmp/cmdline-tools /tmp/cmdline-tools.zip
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -fsSL -o /tmp/cmdline-tools.zip "https://dl.google.com/android/repository/${CMDLINE_TOOLS_ZIP}"
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
          mv /tmp/cmdline-tools/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --version

      - name: Show tool versions
        run: |
          java -version
          flutter --version
          dart --version
          sdkmanager --version

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses >/dev/null
          set -o pipefail
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --install \
            "platform-tools" \
            "platforms;android-34" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${CMAKE_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          printf 'sdk.dir=%s\nflutter.sdk=%s\nflutter.buildMode=debug\nflutter.versionName=3.0.0\nflutter.versionCode=3\nndk.dir=%s\n' \
            "$ANDROID_SDK_ROOT" \
            "$FLUTTER_ROOT" \
            "${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" > android/local.properties

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk --${BUILD_MODE} --target-platform "${TARGET_PLATFORM}" -v 2>&1 | tee flutter-build.log

      - name: Upload APK and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gg-ai-modifier-${{ env.BUILD_MODE }}-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            build/app/outputs/flutter-apk/*.apk
            android/app/build/outputs/**/*.apk
            flutter-build.log
            build/reports/**
            android/app/build/reports/**
